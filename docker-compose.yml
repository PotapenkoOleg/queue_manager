services:
  kafka:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://localhost:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
  postgres:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes: # TODO: Create directory/volume on your machine
      - "postgres_volume:/var/lib/postgresql/data"
    ports: # TODO: Set other port on the left if it's already used on your machine
      - "5432:5432"
    container_name: postgres
  #    networks:
  #      - postgres_network

  sql_server:
    image: "mcr.microsoft.com/mssql/server:2022-latest"
    restart: "always"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "wOf-odESTO2r"
      # MSSQL_PID: "Standard|Developer"
    volumes:
      - "sql_server_volume:/var/opt/mssql"
    ports:
      - "1433:1433"
    container_name: sql_server
#    networks:
#      - sql_server_network

#networks:
#  postgres_network:
#  sql_server_network:
volumes:
  postgres_volume:
  # external: true
  sql_server_volume:
  # external: true